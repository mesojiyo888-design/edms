server:
  port: 8080

spring:
  config:
    activate:
      on-profile: oper
    datasource:
      #jdni설정
      jndi-name: java:comp/env/jdbc/myDataSource
      driver-class-name: com.p6spy.engine.spy.P6SpyDriver
      url: jdbc:p6spy:postgresql://localhost:5432/dev_db
      username: dev_user
      password: 1111

p6spy:
  config:
    log-message-format: egovframework.config.P6SpyConfig
    include-categories: statement  # resultset 제거 (성능)

logging:
  level:
    root: warn
    egovframework: info
    edms: info
    p6spy: info
    jdbc:
      error: error
      connection: error
      audit: error
      sqltiming: error
    jdbc.sqlonly: off
    jdbc.resultsettable: warn
  config: classpath:log4j2.xml

#ai (※ logging: 하위로 잘못 들여쓰기되어 있어 적용되지 않던 것을 root 레벨로 교정 - local.yml과 동일하게 통일)
ollama:
  base-url: http://localhost:11434
  model: gpt-oss:20b
  max-memory-size: 10485760  # 10MB
  api:
    chat: /api/chat

# --------------------------------------------------------------
# 배치 서버(별도 프로젝트, Spring Batch) 연동 설정
# edms는 배치서버 DB에 직접 접근하지 않고, 아래 base-url로 REST 호출만 한다.
# 브라우저는 edms 서버(BatchController 프록시)만 호출하고, edms가 RestTemplate으로
# 배치서버를 중계하여 CORS 문제를 회피한다.
# --------------------------------------------------------------
batch:
  api:
    base-url: http://localhost:8081   # TODO: 운영 배치서버 실제 주소로 교체 필요
    # 배치서버가 여러 대(다중 인스턴스)로 운영될 경우, 수동실행 시 화면에서 선택할 수 있도록
    # 이름/URL을 콤마(,)로 구분해 같은 순서로 나열하면 된다(이 프로젝트는 순수 Spring이라
    # YAML 리스트-오브-맵 자동 바인딩이 안 돼서 콤마 구분 방식을 사용함).
    # 비워두면 화면에서는 base-url을 기본값으로 채워주고, 사용자가 직접 IP를 입력할 수도
    # 있다(직접입력 값이 select 선택보다 우선).
    # TODO: 운영 배치서버 실제 주소로 교체 필요 (localhost로 두면 안 됨)
    server-names: batch-server-01,batch-server-02
    server-urls: http://10.0.0.11:8081,http://10.0.0.12:8081
