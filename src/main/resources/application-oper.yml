server:
  port: 8080

spring:
  config:
    activate:
      on-profile: oper
    datasource:
      #jdni설정
      jndi-name: java:comp/env/jdbc/myDataSource
      driver-class-name: com.p6spy.engine.spy.P6SpyDriver
      url: jdbc:p6spy:postgresql://localhost:5432/dev_db
      username: dev_user
      password: 1111

p6spy:
  config:
    log-message-format: egovframework.config.P6SpyConfig
    include-categories: statement  # resultset 제거 (성능)

logging:
  level:
    root: warn
    egovframework: info
    edms: info
    p6spy: info
    jdbc:
      error: error
      connection: error
      audit: error
      sqltiming: error
    jdbc.sqlonly: off
    jdbc.resultsettable: warn
  config: classpath:log4j2.xml

  #ai
  ollama:
    base-url: http://localhost:11434
    model: gpt-oss:20b
    max-memory-size: 10485760  # 10MB
    api:
      chat: /api/chat